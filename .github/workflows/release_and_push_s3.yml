name: Build and Push to Github and S3, Deploy on Release

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ----------------------------------------------------------
  # Build and push frontend zip to S3 for PRs, main branch, and releases
  # ----------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      release-log: ${{ steps.build-and-push-release.outcome }}
    environment: prometheon-access

    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
            role: SFOE_DRILL_FRONTEND_PIPELINE_ROLE_DEV
            bucket: SFOE_DRILL_FRONTEND_S3_BUCKET_DEV
            backend_url: SFOE_PROMETHEON_CLOUDFRONT_VITE_BACKEND_URL_DEV
            
          - name: prod
            role: SFOE_DRILL_FRONTEND_PIPELINE_ROLE_PROD
            bucket: SFOE_DRILL_FRONTEND_S3_BUCKET_PROD
            backend_url: SFOE_PROMETHEON_CLOUDFRONT_VITE_BACKEND_URL_PROD            

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js (24.x)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Install dependencies
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Build the app
      - name: Build drill-frontend
        run: |

          export VITE_BACKEND_URL="${{ vars[matrix.env.backend_url] }}"
          echo "Building frontend with VITE_BACKEND_URL=$VITE_BACKEND_URL"

          npm run build

          echo "Verifying backend URL was inlined in the build..."
          count=$(grep -R -I -o "$VITE_BACKEND_URL" dist/ | wc -l)

          if [ "$count" -eq 0 ]; then
            echo "ERROR: VITE_BACKEND_URL not found in build! Build output may be broken."
            exit 1
          else
            echo "Found VITE_BACKEND_URL $count times in build artifacts."
          fi

      # Archive build output into a zip file
      - name: Create zip archive
        run: zip -r drill-frontend.zip dist

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.env.role] }}
          aws-region: eu-central-1  
          
      # Upload zip to S3 (PR)
      - name: Upload zip to S3 (PR)
        if: github.event_name == 'pull_request' && matrix.env.name == 'dev'
        env:
          S3_BUCKET: ${{ vars[matrix.env.bucket] }}
          TAG_NAME: ${{ github.event.pull_request.number }}
        run: |
          aws s3 cp drill-frontend.zip s3://$S3_BUCKET/drill-frontend-$TAG_NAME.zip

      # Upload zip to S3 (Main branch)
      - name: Upload zip to S3 (Main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.env.name == 'dev'
        env:
          S3_BUCKET: ${{ vars[matrix.env.bucket] }}
          TAG_NAME: latest
        run: |
          aws s3 cp drill-frontend.zip s3://$S3_BUCKET/drill-frontend-$TAG_NAME.zip

      # Upload zip to S3 (release event)
      - name: Upload zip to S3 (release event)
        id: build-and-push-release
        if: github.event_name == 'release'
        env:
          S3_BUCKET: ${{ vars[matrix.env.bucket] }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          aws s3 cp drill-frontend.zip s3://$S3_BUCKET/drill-frontend-$TAG_NAME.zip

      # Upload zip to the Github release assets (only once)
      - name: Upload release asset
        if: github.event_name == 'release' && matrix.env.name == 'prod'
        uses: softprops/action-gh-release@v1
        with:
          files: drill-frontend.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  # ----------------------------------------------------------
  # Automated deployment upon release
  # ----------------------------------------------------------
  deploy-image:            
    name: deploy-image
    needs: build-and-push
    runs-on: ubuntu-latest
    if: (needs.build-and-push.outputs.release-log == 'success') && (github.event_name == 'release')
    environment: prometheon-access
    env:
          VERSION_TAG: ${{ github.event.release.tag_name }}
    
    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
          - name: prod          

    steps:
      # ----------------------------------------------------------
      # Authenticate as GitHub App
      # ----------------------------------------------------------
      - name: Authenticate as GitHub App
        id: app-auth
        uses: actions/create-github-app-token@v2
        with:
            app-id: ${{ secrets.GH_APP_ID }}
            private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
            owner: SFOE-Prometheon

      # ----------------------------------------------------------
      # Checkout Terraform Repo using GitHub App Token
      # ----------------------------------------------------------
      - name: Clone Terraform Repo
        uses: actions/checkout@v4
        with:
            repository: SFOE-prometheon/prometheon-drillcheck-${{ matrix.env.name }}
            ref: main
            token: ${{ steps.app-auth.outputs.token }}
            path: tf-repo

      # ----------------------------------------------------------
      # Update Version
      # ----------------------------------------------------------
      - name: Update version in Terraform repo        
        run: |
            cd tf-repo
            sed -i "s/\"frontend_app_version\": \".*\"/\"frontend_app_version\": \"${{ env.VERSION_TAG }}\"/" deploy.auto.tfvars.json

      # ----------------------------------------------------------
      # Commit & Push/PR based on environment
      # ----------------------------------------------------------
      - name: Create branch and commit changes
        run: |
            cd tf-repo
            git config user.name "GitHub Actions"
            git config user.email "noreply@github.com"
            git checkout -b deploy/frontend-${{ env.VERSION_TAG }}
            git add deploy.auto.tfvars.json
            git commit -m "Deploy frontend version ${{ env.VERSION_TAG }}"
            
      - name: Push to main (Dev environment)
        if: matrix.env.name == 'dev'
        run: |
            cd tf-repo
            git push origin deploy/frontend-${{ env.VERSION_TAG }}:main
        env:
            GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Create PR (Prod environment)
        if: matrix.env.name == 'prod'
        run: |
            cd tf-repo
            git push origin deploy/frontend-${{ env.VERSION_TAG }}
            gh pr create \
              --base main \
              --head deploy/frontend-${{ env.VERSION_TAG }} \
              --title "Deploy frontend version ${{ env.VERSION_TAG }} to prod" \
              --body "Automated deployment PR for frontend version ${{ env.VERSION_TAG }}"
        env:
            GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

