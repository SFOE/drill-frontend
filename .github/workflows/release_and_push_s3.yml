name: Build, Scan and Push drill-frontend to S3

on:
  pull_request:
    types: [closed]
    branches:
      - main
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  # ----------------------------------------------------------
  # Build frontend zip for each environment (matrix for backend URLs)
  # ----------------------------------------------------------
  build:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'release'
    runs-on: ubuntu-latest

    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
            backend_url: ${{ vars.SFOE_PROMETHEON_CLOUDFRONT_VITE_BACKEND_URL_DEV }}
          - name: prod
            backend_url: ${{ vars.SFOE_PROMETHEON_CLOUDFRONT_VITE_BACKEND_URL_PROD }}

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js (24.x)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Install dependencies
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Build the app
      - name: Build drill-frontend
        run: |
          export VITE_BACKEND_URL="${{ vars[matrix.env.backend_url] }}"
          echo "Building frontend with VITE_BACKEND_URL=$VITE_BACKEND_URL"

          npm run build

          echo "Verifying backend URL was inlined in the build..."
          count=$(grep -R -I -o "$VITE_BACKEND_URL" dist/ | wc -l)

          if [ "$count" -eq 0 ]; then
            echo "ERROR: VITE_BACKEND_URL not found in build! Build output may be broken."
            exit 1
          else
            echo "Found VITE_BACKEND_URL $count times in build artifacts."
          fi

      # Archive build output into a zip file
      - name: Create zip archive
        run: zip -r drill-frontend-${{ matrix.env.name }}.zip dist

      # Upload artifact for downstream scan-push jobs
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: drill-frontend-${{ matrix.env.name }}
          path: drill-frontend-${{ matrix.env.name }}.zip

  # ----------------------------------------------------------
  # Scan and push latest to dev on PR merge
  # ----------------------------------------------------------
  scan-push-dev-latest:
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    uses: SFOE-prometheon/github-terraform-workflows/.github/workflows/s3-artifact-scan-push.yml@v7
    with:
      s3-artifact-name: drill-frontend
      artifact-name: drill-frontend-dev
      s3-bucket: ${{ vars.SFOE_DRILL_FRONTEND_S3_BUCKET_DEV }}
      tag-name: latest
      aws-region: eu-central-1
      scan-type: repository
    secrets:
      aws-role: ${{ secrets.SFOE_DRILL_FRONTEND_PIPELINE_ROLE_DEV }}

  # ----------------------------------------------------------
  # Scan and push release tag to dev and prod
  # ----------------------------------------------------------
  scan-push-dev:
    needs: build
    if: github.event_name == 'release'
    uses: SFOE-prometheon/github-terraform-workflows/.github/workflows/s3-artifact-scan-push.yml@v7
    with:
      s3-artifact-name: drill-frontend
      artifact-name: drill-frontend-dev
      s3-bucket: ${{ vars.SFOE_DRILL_FRONTEND_S3_BUCKET_DEV }}
      tag-name: ${{ github.event.release.tag_name }}
      aws-region: eu-central-1
      scan-type: repository
    secrets:
      aws-role: ${{ secrets.SFOE_DRILL_FRONTEND_PIPELINE_ROLE_DEV }}

  scan-push-prod:
    needs: build
    if: github.event_name == 'release'
    uses: SFOE-prometheon/github-terraform-workflows/.github/workflows/s3-artifact-scan-push.yml@v7
    with:
      s3-artifact-name: drill-frontend
      artifact-name: drill-frontend-prod
      s3-bucket: ${{ vars.SFOE_DRILL_FRONTEND_S3_BUCKET_PROD }}
      tag-name: ${{ github.event.release.tag_name }}
      aws-region: eu-central-1
      scan-type: repository
    secrets:
      aws-role: ${{ secrets.SFOE_DRILL_FRONTEND_PIPELINE_ROLE_PROD }}

  # ----------------------------------------------------------
  # Upload zip to the Github release assets
  # ----------------------------------------------------------
  upload-release-asset:
    needs: scan-push-prod
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: drill-frontend-prod

      - name: Rename artifact for release
        run: mv drill-frontend-prod.zip drill-frontend.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: drill-frontend.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------
  # Push summary
  # ----------------------------------------------------------
  post-push:
    needs: [scan-push-dev-latest, scan-push-dev, scan-push-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print push summary
        run: |
          echo "## Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Artifact Name | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dev (Latest) | ${{ needs.scan-push-dev-latest.outputs.s3-key || 'N/A' }} | ${{ needs.scan-push-dev-latest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dev (Release) | ${{ needs.scan-push-dev.outputs.s3-key || 'N/A' }} | ${{ needs.scan-push-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prod (Release) | ${{ needs.scan-push-prod.outputs.s3-key || 'N/A' }} | ${{ needs.scan-push-prod.result }} |" >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------
  # Automated deployment upon release
  # ----------------------------------------------------------
  deploy-image:
    name: deploy-image
    needs: [scan-push-dev, scan-push-prod]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    env:
      VERSION_TAG: ${{ github.event.release.tag_name }}

    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
          - name: prod

    steps:
      # ----------------------------------------------------------
      # Authenticate as GitHub App
      # ----------------------------------------------------------
      - name: Authenticate as GitHub App
        id: app-auth
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: SFOE-Prometheon

      # ----------------------------------------------------------
      # Checkout Terraform Repo using GitHub App Token
      # ----------------------------------------------------------
      - name: Clone Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: SFOE-prometheon/prometheon-drillcheck-${{ matrix.env.name }}
          ref: main
          token: ${{ steps.app-auth.outputs.token }}
          path: tf-repo

      # ----------------------------------------------------------
      # Update Version
      # ----------------------------------------------------------
      - name: Update version in Terraform repo
        run: |
          cd tf-repo
          sed -i "s/\"frontend_app_version\": \".*\"/\"frontend_app_version\": \"${{ env.VERSION_TAG }}\"/" deploy.auto.tfvars.json

      # ----------------------------------------------------------
      # Commit & Push/PR based on environment
      # ----------------------------------------------------------
      - name: Create branch and commit changes
        run: |
          cd tf-repo
          git config user.name "GitHub Actions"
          git config user.email "noreply@github.com"
          git checkout -b deploy/frontend-${{ env.VERSION_TAG }}
          git add deploy.auto.tfvars.json
          git commit -m "Deploy frontend version ${{ env.VERSION_TAG }}"

      - name: Push to main (Dev environment)
        if: matrix.env.name == 'dev'
        run: |
          cd tf-repo
          git push origin deploy/frontend-${{ env.VERSION_TAG }}:main
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Create PR (Prod environment)
        if: matrix.env.name == 'prod'
        run: |
          cd tf-repo
          git push origin deploy/frontend-${{ env.VERSION_TAG }}
          gh pr create \
            --base main \
            --head deploy/frontend-${{ env.VERSION_TAG }} \
            --title "Deploy frontend version ${{ env.VERSION_TAG }} to prod" \
            --body "Automated deployment PR for frontend version ${{ env.VERSION_TAG }}"
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}
